<section class="grid gap-6" aria-labelledby="dashboard-title">
  <isumi-page-header eyebrow="Resumo" title="{{ auth.profile()?.name || 'Dashboard' }}" titleId="dashboard-title">
    <div actions class="flex shrink-0 items-center justify-end gap-2">
      <isumi-button variant="secondary" size="sm" iconOnly [ariaLabel]="valuesHidden() ? 'Mostrar valores' : 'Ocultar valores'" [ariaPressed]="valuesHidden()" (click)="toggleValues()">
        @if (valuesHidden()) {
          <svg icon lucideEyeOff class="size-4" aria-hidden="true"></svg>
        } @else {
          <svg icon lucideEye class="size-4" aria-hidden="true"></svg>
        }
      </isumi-button>

      <isumi-button variant="secondary" size="sm" iconOnly ariaLabel="Atualizar dashboard" [loading]="loading()" (click)="load()">
        <svg icon lucideRefreshCw class="size-4" aria-hidden="true"></svg>
        Atualizar dashboard
      </isumi-button>
    </div>
  </isumi-page-header>

  @if (loading()) {
    <isumi-dashboard-skeleton />
  } @else if (error()) {
    <section class="grid gap-4 rounded-lg bg-card p-5">
      <div class="grid gap-1">
        <h2 class="m-0 text-[1.2rem] font-black">Não foi possível carregar o resumo</h2>
        <p class="m-0 text-sm leading-6 text-muted-foreground">Tente atualizar o dashboard. Suas ferramentas continuam disponíveis pelo menu lateral.</p>
      </div>
      <isumi-button variant="secondary" size="sm" (click)="load()">
        <svg icon lucideRefreshCw class="size-4" aria-hidden="true"></svg>
        Tentar novamente
      </isumi-button>
    </section>
  } @else if (summary(); as state) {
    <div class="grid grid-cols-[minmax(0,1.05fr)_minmax(19rem,0.95fr)] items-stretch gap-5 max-lg:grid-cols-1">
      <isumi-dashboard-expense-debts [debts]="state.expenseDebts" [hidden]="valuesHidden()" />
      <isumi-dashboard-monthly-card [summary]="state.monthly" [hidden]="valuesHidden()" />
    </div>

    <isumi-dashboard-upcoming-trips [trips]="state.upcomingTrips" />
  }
</section>
