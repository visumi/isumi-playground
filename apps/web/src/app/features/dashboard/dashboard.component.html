<section class="grid gap-6" aria-labelledby="dashboard-title">
  <isumi-page-header eyebrow="Bem-vindo" title="{{ auth.profile()?.name || 'vamos comecar' }}" titleId="dashboard-title" />

  <div class="grid grid-cols-[minmax(0,1.25fr)_minmax(260px,0.75fr)] gap-4 max-md:grid-cols-1">
    <isumi-card padding="lg" [interactive]="true" class="grid min-h-60 content-start">
      <a class="grid content-start text-card-foreground no-underline" routerLink="/tools/notes">
        <isumi-badge variant="primary">
          <svg lucideSparkles class="size-3.5" aria-hidden="true"></svg>
          Disponível agora
        </isumi-badge>
        <h2 class="mb-2.5 mt-5 text-[1.35rem] font-black tracking-[-0.02em]">Notas rápidas</h2>
        <p class="m-0 max-w-[58ch] leading-6 text-muted-foreground">Salve ideias curtas, rascunhos e lembretes vinculados ao seu usuario.</p>
        <strong class="mt-10 inline-flex items-center gap-2 self-end text-sm font-black text-foreground">
          Abrir notas
          <svg lucideArrowRight class="size-4" aria-hidden="true"></svg>
        </strong>
      </a>
    </isumi-card>

    <isumi-card variant="secondary" padding="lg" aria-label="Proximos espacos">
      <span class="grid h-10 w-10 place-items-center rounded-sm bg-accent text-accent-foreground" aria-hidden="true">
        <svg lucideWrench class="size-5"></svg>
      </span>
      <h2 class="mb-2.5 mt-4 text-[1.35rem] font-black tracking-[-0.02em]">Em construcao</h2>
      <p class="m-0 leading-6 text-muted-foreground">Novas ferramentas entram aqui usando o mesmo shell, estados e linguagem visual.</p>
    </isumi-card>
  </div>
</section>
