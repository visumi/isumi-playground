name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "db/migrations/**"
      - "scripts/apply-migrations.mjs"
      - "scripts/load-env.mjs"
      - "package*.json"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    environment:
      name: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm install

      - name: Apply database migrations
        run: npm run db:migrate
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Write Worker secrets file
        run: |
          cat > apps/api/.secrets.production <<EOF
          TURSO_URL="${TURSO_URL}"
          TURSO_AUTH_TOKEN="${TURSO_AUTH_TOKEN}"
          FIREBASE_PROJECT_ID="${FIREBASE_PROJECT_ID}"
          ALLOWED_EMAILS="${ALLOWED_EMAILS}"
          EOF
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}

      - name: Deploy Worker
        run: npx wrangler deploy --config apps/api/wrangler.jsonc --secrets-file apps/api/.secrets.production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
